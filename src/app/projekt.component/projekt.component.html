<section class="max-w-7xl mx-auto px-6 py-24 space-y-24">

  <!-- Aktuelle Projekte -->
  <div>
    <h1 class="text-4xl font-light mb-12 text-gray-800">Aktuelle Projekte</h1>

    <div class="grid md:grid-cols-3 gap-8">
      <a
        *ngFor="let projekt of aktuelleProjekte"
        [routerLink]="['/projekt']"
        [queryParams]="{
          pdf: projekt.dateiname,
          title: projekt.titel
        }"
        class="group block bg-white rounded-xl shadow-lg overflow-hidden
               transition-all duration-300
               hover:-translate-y-1 hover:shadow-2xl"
      >

        <!-- Bild -->
        <div
          class="h-64 bg-neutral-200 transition-transform duration-500 group-hover:scale-105"
          [ngStyle]="{
            'background-image': projekt.bild ? 'url(' + projekt.bild + ')' : 'none',
            'background-size': 'cover',
            'background-position': 'center'
          }">
        </div>

        <!-- Inhalt -->
        <div class="p-5">
          <h2 class="font-semibold text-xl mb-1 text-gray-900">
            {{ projekt.titel }}
          </h2>
          <h3 class="text-gray-500 mb-4">
            {{ projekt.ort }}
          </h3>

          <span class="text-sm font-medium text-orange-700">
            Projekt ansehen →
          </span>
        </div>

      </a>
    </div>
  </div>

  <!-- Abgeschlossene Projekte -->
  <div *ngFor="let kategorie of abgeschlosseneProjekte">
    <h1 class="text-4xl font-light mb-12 text-gray-800">
      {{ kategorie.kategorie }}
    </h1>

    <div class="grid md:grid-cols-4 gap-8">
      <a
        *ngFor="let projekt of kategorie.projekte"
        [routerLink]="['/projekt']"
        [queryParams]="{
          pdf: projekt.dateiname,
          title: projekt.titel
        }"
        class="group block bg-white rounded-xl shadow-lg overflow-hidden
               transition-all duration-300
               hover:-translate-y-1 hover:shadow-2xl"
      >

        <!-- Bild -->
        <div
          class="h-64 bg-neutral-200 transition-transform duration-500 group-hover:scale-105"
          [ngStyle]="{
            'background-image': projekt.bild ? 'url(' + projekt.bild + ')' : 'none',
            'background-size': 'cover',
            'background-position': 'center'
          }">
        </div>

        <!-- Inhalt -->
        <div class="p-5">
          <h2 class="font-semibold text-lg mb-1 text-gray-900">
            {{ projekt.titel }}
          </h2>
          <h3 class="text-gray-500 mb-4">
            {{ projekt.ort }}
          </h3>

          <span class="text-sm font-medium text-orange-700">
            Projekt ansehen →
          </span>
        </div>

      </a>
    </div>
  </div>

</section>
