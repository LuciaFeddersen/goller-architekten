<section class="max-w-7xl mx-auto px-6 py-24">
  <h1 class="text-4xl font-light mb-12">Projekte</h1>

  <div class="grid md:grid-cols-3 gap-8">
    @for (projekt of ['wohnhaus-a', 'museum-b', 'buero-c']; track projekt) {
      <a
        [routerLink]="['/projekte', projekt]"
        class="group"
      >
        <div class="h-64 bg-neutral-200"></div>
        <h2 class="mt-4 font-medium group-hover:underline">
          Projekt {{ projekt }}
        </h2>
      </a>
    }
  </div>
</section>
