<!-- Slider -->
<div class="relative w-full h-screen overflow-hidden">

  <!-- Slides -->
  <div *ngFor="let kategorie of projektKategorien; let i = index"
     class="absolute inset-0 transition-opacity duration-1000"
     [class.opacity-100]="i === currentIndex"
     [class.opacity-0]="i !== currentIndex"
     [class.pointer-events-none]="i !== currentIndex"
     [class.pointer-events-auto]="i === currentIndex">

    <!-- Hintergrundbild -->
    <div class="w-full h-full bg-center bg-cover"
         [ngStyle]="{'background-image': 'url(' + kategorie.bild + ')'}"></div>

    <!-- Overlay mit Text links -->
    <div class="absolute inset-0 bg-black bg-opacity-30 flex items-center px-8 md:px-24">
      <div class="text-left max-w-xl">
        <h2 class="text-4xl md:text-6xl font-bold text-white mb-4">{{ kategorie.titel }}</h2>
        <p class="text-lg md:text-2xl text-white mb-6">{{ kategorie.beschreibung }}</p>
        <button (click)="openKategorie(kategorie)"
                class="bg-orange-600 hover:bg-orange-700 text-white font-semibold py-3 px-6 rounded">
          Mehr erfahren
        </button>
      </div>
    </div>
  </div>

  <!-- Navigation Pfeile -->
  <button (click)="prevSlide()"
          class="absolute left-5 top-1/2 transform -translate-y-1/2 
                 bg-black bg-opacity-40 hover:bg-opacity-60 text-white 
                 p-3 rounded-full z-50 shadow-lg">
    &#10094;
  </button>
  <button (click)="nextSlide()"
          class="absolute right-5 top-1/2 transform -translate-y-1/2 
                 bg-black bg-opacity-40 hover:bg-opacity-60 text-white 
                 p-3 rounded-full z-50 shadow-lg">
    &#10095;
  </button>

  <!-- Optional: Slide-Indikatoren -->
  <div class="absolute bottom-5 left-1/2 transform -translate-x-1/2 flex gap-2">
    <span *ngFor="let kategorie of projektKategorien; let i = index"
          (click)="goToSlide(i)"
          [class.bg-white]="i === currentIndex"
          [class.bg-gray-400]="i !== currentIndex"
          class="w-3 h-3 rounded-full cursor-pointer transition-colors"></span>
  </div>
</div>
